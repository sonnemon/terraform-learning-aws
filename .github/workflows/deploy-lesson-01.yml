name: deploy-lesson-01

on:
  push:
    branches: [main]
    paths:
      - "lesson-01-s3-static-site/app/**"
  workflow_dispatch: # manual run button

permissions:
  id-token: write # required to request the OIDC token
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lesson-01-s3-static-site/app

    steps:
      # Actions pinned to commit SHAs (tags can be moved, SHAs can't)
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: lesson-01-s3-static-site/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.LESSON_01_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: aws s3 sync dist/ "s3://${{ vars.LESSON_01_BUCKET }}" --delete
